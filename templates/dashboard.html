{% extends "base.html" %}

{% block content %}

<div class="row">

    <div class="col-lg-3">

        <div class="small-box text-bg-primary">

            <div class="inner">

                <h3>{{ total_crimes }}</h3>

                <p>Total Crimes</p>

            </div>

            <div class="small-box-icon">

                <i class="fas fa-shield-alt"></i>

            </div>

        </div>

    </div>

    <div class="col-lg-3">

        <div class="small-box text-bg-success">

            <div class="inner">

                <h3>{{ total_states }}</h3>

                <p>States</p>

            </div>

            <div class="small-box-icon">

                <i class="fas fa-map"></i>

            </div>

        </div>

    </div>

    <div class="col-lg-3">

        <div class="small-box text-bg-warning">

            <div class="inner">

                <h3>{{ total_districts }}</h3>

                <p>Districts</p>

            </div>

            <div class="small-box-icon">

                <i class="fas fa-city"></i>

            </div>

        </div>

    </div>

    <div class="col-lg-3">

        <div class="small-box text-bg-danger">

            <div class="inner">

                <h3>₹ {{ "{:,.0f}".format(total_loss) }}</h3>

                <p>Total Loss</p>

            </div>

            <div class="small-box-icon">

                <i class="fas fa-indian-rupee-sign"></i>

            </div>

        </div>

    </div>

</div>
<div class="row">

    <!-- Monthly Trend -->
    <div class="col-lg-8">

        <div class="card shadow-sm">

            <div class="card-header">
                <h5 class="mb-0">
                    Monthly Crime Trend
                </h5>
            </div>

            <div class="card-body">

                <canvas id="monthlyCrimeChart"></canvas>

            </div>

        </div>

    </div>

    <!-- Crime Category -->
    <div class="col-lg-4">

        <div class="card shadow-sm">

            <div class="card-header">
                <h5 class="mb-0">
                    Crime Categories
                </h5>
            </div>

            <div class="card-body">

                <canvas id="categoryChart"></canvas>

            </div>

        </div>

    </div>

</div>

<div class="row mt-4">

    <!-- Top States -->
    <div class="col-lg-7">

        <div class="card shadow-sm">

            <div class="card-header">
                <h5 class="mb-0">
                    Top 10 States by Crime
                </h5>
            </div>

            <div class="card-body">

                <canvas id="stateChart"></canvas>

            </div>

        </div>

    </div>

    <!-- Arrest -->
    <div class="col-lg-5">

        <div class="card shadow-sm">

            <div class="card-header">
                <h5 class="mb-0">
                    Arrest Status
                </h5>
            </div>

            <div class="card-body">

                <canvas id="arrestChart"></canvas>

            </div>

        </div>

    </div>

</div>

{% endblock %}
